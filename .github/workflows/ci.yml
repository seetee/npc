name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --frozen --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Unit tests
        run: uv run pytest
