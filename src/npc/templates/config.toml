# npc campaign configuration — every key is optional; defaults shown.
# NOTE: these top-level keys must stay ABOVE the [sections].

# history_limit = 30                # messages of dialogue kept in the prompt
# logbook_sessions_in_prompt = 3    # previous session summaries the NPC remembers
# checkpoint_every_turns = 20       # auto-save logbook every N player turns
# min_clip_seconds = 0.25           # discard accidental taps shorter than this

[llm]
# model = "qwen2.5:7b-instruct"     # any Ollama model tag
# host = "http://localhost:11434"

[stt]
# model = "small"                   # whisper size: tiny/base/small/medium/large-v3
# language = "auto"                 # "auto" understands Swedish and English; pin with "sv"/"en"
# device = "auto"                   # auto/cpu/cuda

[tts]
# voice = "en_GB-alba-medium"       # Piper voice (Alba, British English)
# voices_dir = "~/.local/share/npc/voices"

[hotkey]
# key = "KEY_SPACE"                 # any evdev key name, e.g. KEY_RIGHTCTRL, KEY_F12
# device = ""                       # pin one device, e.g. "/dev/input/by-id/usb-...-event-kbd"
# grab = false                      # true = take the device exclusively (dedicated buttons only!)
