# npc campaign configuration — every key is optional; defaults shown.
# NOTE: these top-level keys must stay ABOVE the [sections].

# history_limit = 30                # messages of dialogue kept in the prompt
# logbook_sessions_in_prompt = 3    # previous session summaries the NPC remembers
# checkpoint_every_turns = 20       # auto-save logbook every N player turns
# min_clip_seconds = 0.25           # discard accidental taps shorter than this

[llm]
# backend = "ollama"                # or "openai" for Jan, LM Studio, llama.cpp, vLLM, …
# model = "qwen2.5:7b-instruct"     # Ollama tag, or the model name your app lists
# host = "http://localhost:11434"   # Jan: http://localhost:1337  LM Studio: http://localhost:1234
# timeout_seconds = 60              # per-request cap; a hung server becomes an error, not a stuck session
# retries = 1                       # extra attempts after connection failures (HTTP errors never retry)
# stream = true                     # speak sentence-by-sentence while the reply generates
# api_key = ""                      # OpenAI-compatible servers only — stored in PLAINTEXT here;
#                                   # prefer:  export NPC_LLM_API_KEY=...  (overrides this value)

[stt]
# model = "small"                   # whisper size: tiny/base/small/medium/large-v3
# language = "auto"                 # "auto" understands Swedish and English; pin with "sv"/"en"
# device = "auto"                   # auto/cpu/cuda
# silence_threshold_db = -45        # clips quieter than this (dBFS) are discarded as silence
#                                   # raise it (e.g. -35) if room noise triggers phantom replies
# vad_silence_seconds = 1.2         # tap mode: this much trailing silence ends a recording
# vad_max_seconds = 30              # tap mode: hard cap on one utterance

[tts]
# voice = "en_GB-alba-medium"       # Piper voice (Alba, British English)
# voices_dir = "~/.local/share/npc/voices"

[overlay]
# enabled = false                   # broadcast events + serve the overlay page while running
# port = 8765                       # OBS browser source / browser: http://127.0.0.1:8765
#                                   # (always localhost-only; `npc run --overlay` forces it on)

[hotkey]
# key = "KEY_SPACE"                 # any evdev key name, e.g. KEY_RIGHTCTRL, KEY_F12
# mode = "hold"                     # "hold" = push-to-talk; "tap" = tap once, silence ends it
# device = ""                       # pin one device, e.g. "/dev/input/by-id/usb-...-event-kbd"
# grab = false                      # true = take the device exclusively (dedicated buttons only!)
